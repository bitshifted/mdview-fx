<html data-theme="light">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" type="text/css" href="css/pico.min.css">
        <link rel="stylesheet" type="text/css" href="css/basic-style.css">
        <script src="js/clusterize.js" ></script>
        <script src="js/mdview-fx.js" defer ></script>
    </head>
    <body>
        <main class="container">
            <div id="scrollArea" class="clusterize-scroll">
                <!-- chat message toolbar -->
                <div id="hover-toolbar" class="msg-toolbar">
                    <a href="###" class="tool-btn" data-tooltip="Copy Markdown" data-action="copy-md"><img src="img/copy-md.svg" /></a>
                    <a href="###" class="tool-btn" data-tooltip="Copy HTML" data-action="copy-html"><img src="img/copy-html.svg" /></a>
                </div>
                <div id="contentArea" class="clusterize-content">
                    <div class="clusterize-no-data">Waiting for messages ...</div>
                </div>
            </div>
            <div id="streaming"></div>
        </main>
    </body>
</html>
